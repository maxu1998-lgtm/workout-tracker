<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nippard Full Body HF</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0a0a0f;
  --card: #13131c;
  --card2: #1a1a28;
  --border: #2a2a3d;
  --accent: #ff6b35;
  --accent2: #ff8f65;
  --green: #34d399;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --text: #e8e6f0;
  --text2: #9896a8;
  --text3: #6b6980;
  --danger: #f87171;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:var(--bg); }
body {
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom,20px);
  overflow-x:hidden;
}

/* HEADER */
.app-header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,15,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  padding-top:max(12px,env(safe-area-inset-top));
}
.app-header h1 {
  font-size:15px; font-weight:700; letter-spacing:.5px;
  color:var(--accent);
  text-transform:uppercase;
}
.app-header .sub { font-size:12px; color:var(--text2); margin-top:2px; }

/* WEEK/DAY SELECTORS */
.selector-row {
  display:flex; gap:8px; padding:12px 16px;
  overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.selector-row::-webkit-scrollbar { display:none; }
.sel-btn {
  flex-shrink:0;
  padding:8px 14px;
  border-radius:10px;
  border:1.5px solid var(--border);
  background:var(--card);
  color:var(--text2);
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.sel-btn.active {
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
  box-shadow:0 2px 12px rgba(255,107,53,.3);
}
.sel-btn.done {
  border-color:var(--green);
  color:var(--green);
}
.sel-btn.done.active {
  background:var(--green);
  color:#fff;
  border-color:var(--green);
  box-shadow:0 2px 12px rgba(52,211,153,.3);
}

.section-label {
  padding:4px 16px 6px;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text3);
  font-weight:600;
}

/* EXERCISE CARDS */
.exercises { padding:0 12px 24px; }
.ex-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .2s;
}
.ex-card.completed { border-color:var(--green); }
.ex-header {
  display:flex; align-items:flex-start; gap:10px;
  padding:14px 14px 10px;
  cursor:pointer;
}
.ex-num {
  flex-shrink:0;
  width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  background:var(--card2);
  border-radius:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:600;
  color:var(--accent);
}
.ex-card.completed .ex-num { background:var(--green); color:#fff; }
.ex-info { flex:1; min-width:0; }
.ex-name {
  font-size:14px; font-weight:700;
  line-height:1.3;
  text-transform:uppercase;
  letter-spacing:.3px;
}
.ex-meta {
  display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;
}
.ex-tag {
  font-size:11px;
  padding:3px 8px;
  border-radius:6px;
  font-weight:600;
  font-family:'JetBrains Mono',monospace;
}
.tag-sets { background:rgba(96,165,250,.15); color:var(--blue); }
.tag-reps { background:rgba(167,139,250,.15); color:var(--purple); }
.tag-rpe { background:rgba(255,107,53,.15); color:var(--accent2); }
.tag-rest { background:rgba(52,211,153,.1); color:var(--green); }

.ex-note {
  padding:0 14px 10px;
  font-size:12px;
  color:var(--text3);
  line-height:1.4;
  display:none;
}
.ex-card.open .ex-note { display:block; }

/* SET ROWS */
.sets-area {
  padding:0 14px 14px;
  display:none;
}
.ex-card.open .sets-area { display:block; }
.set-row {
  display:grid;
  grid-template-columns:32px 1fr 1fr 40px;
  gap:8px;
  align-items:center;
  margin-bottom:6px;
}
.set-label {
  font-size:11px; font-weight:600;
  color:var(--text3);
  text-align:center;
  font-family:'JetBrains Mono',monospace;
}
.set-input {
  width:100%;
  padding:10px 8px;
  border-radius:8px;
  border:1.5px solid var(--border);
  background:var(--card2);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  text-align:center;
  outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.set-input:focus { border-color:var(--accent); }
.set-input::placeholder { color:var(--text3); font-size:11px; }
.set-check {
  width:36px; height:36px;
  border-radius:8px;
  border:1.5px solid var(--border);
  background:var(--card2);
  color:var(--text3);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:16px;
  transition:all .2s;
}
.set-check.done {
  background:var(--green);
  border-color:var(--green);
  color:#fff;
}
.sets-header {
  display:grid;
  grid-template-columns:32px 1fr 1fr 40px;
  gap:8px;
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.sets-header span {
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--text3);
  text-align:center;
  font-weight:600;
}

/* TIMER */
.timer-bar {
  position:fixed;
  bottom:0;
  left:0; right:0;
  z-index:200;
  background:rgba(13,13,28,.96);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:12px 16px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex;
  align-items:center;
  gap:12px;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.22,1,.36,1);
}
.timer-bar.visible { transform:translateY(0); }
.timer-display {
  font-family:'JetBrains Mono',monospace;
  font-size:32px;
  font-weight:700;
  color:var(--accent);
  min-width:100px;
  letter-spacing:1px;
}
.timer-display.done-color { color:var(--green); }
.timer-controls { display:flex; gap:8px; flex:1; justify-content:flex-end; }
.timer-btn {
  padding:10px 18px;
  border-radius:10px;
  border:none;
  font-family:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.btn-start { background:var(--accent); color:#fff; }
.btn-stop { background:var(--danger); color:#fff; }
.btn-reset { background:var(--card2); color:var(--text2); border:1.5px solid var(--border); }
.timer-label {
  font-size:11px;
  color:var(--text3);
  text-align:center;
}

/* TIMER PRESETS */
.timer-presets {
  display:flex; gap:6px; flex-wrap:wrap;
}
.preset-btn {
  padding:6px 12px;
  border-radius:8px;
  border:1.5px solid var(--border);
  background:var(--card2);
  color:var(--text2);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}
.preset-btn.active { border-color:var(--accent); color:var(--accent); }

/* FAB */
.timer-fab {
  position:fixed;
  bottom:20px;
  right:16px;
  z-index:150;
  width:56px; height:56px;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  border:none;
  font-size:22px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(255,107,53,.4);
  cursor:pointer;
  padding-bottom:env(safe-area-inset-bottom,0);
}

/* PROGRESS BAR */
.progress-wrap {
  padding:8px 16px 4px;
}
.progress-outer {
  height:4px;
  background:var(--card2);
  border-radius:2px;
  overflow:hidden;
}
.progress-inner {
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:2px;
  transition:width .4s;
}
.progress-text {
  font-size:11px; color:var(--text3); margin-top:4px;
  font-family:'JetBrains Mono',monospace;
  text-align:right;
}

/* MARK DAY COMPLETE */
.day-complete-btn {
  display:block;
  width:calc(100% - 24px);
  margin:8px 12px 20px;
  padding:14px;
  border-radius:var(--radius);
  border:2px dashed var(--border);
  background:transparent;
  color:var(--text2);
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:1px;
  transition:all .2s;
}
.day-complete-btn.is-done {
  border-style:solid;
  border-color:var(--green);
  color:var(--green);
  background:rgba(52,211,153,.08);
}

/* RESPONSIVE */
@media (max-width:390px) {
  .ex-name { font-size:13px; }
  .timer-display { font-size:28px; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>Perek Maxime — Full Body x5</h1>
  <div class="sub" id="weekLabel">Programme 10 semaines • 5 jours/sem</div>
</div>

<div class="selector-row" id="weekSelector"></div>

<div class="section-label">Jour</div>
<div class="selector-row" id="daySelector"></div>

<div class="progress-wrap">
  <div class="progress-outer"><div class="progress-inner" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0 séries</div>
</div>

<div class="exercises" id="exerciseList"></div>

<button class="day-complete-btn" id="dayCompleteBtn" onclick="toggleDayComplete()">Marquer jour terminé ✓</button>

<button class="timer-fab" id="timerFab" onclick="toggleTimer()">⏱</button>

<div class="timer-bar" id="timerBar">
  <div>
    <div class="timer-display" id="timerDisplay">0:00</div>
    <div class="timer-label" id="timerLabel">Repos</div>
  </div>
  <div style="flex:1">
    <div class="timer-presets" id="timerPresets">
      <button class="preset-btn" onclick="setTimer(60)">1:00</button>
      <button class="preset-btn" onclick="setTimer(90)">1:30</button>
      <button class="preset-btn active" onclick="setTimer(120)">2:00</button>
      <button class="preset-btn" onclick="setTimer(180)">3:00</button>
      <button class="preset-btn" onclick="setTimer(240)">4:00</button>
    </div>
    <div class="timer-controls" style="margin-top:8px">
      <button class="timer-btn btn-reset" onclick="resetTimer()">Reset</button>
      <button class="timer-btn btn-start" id="timerStartBtn" onclick="startTimer()">Start</button>
    </div>
  </div>
</div>

let currentWeek = 1, currentDay = 1;

let timerVisible = false;

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function saveData(key,val){ try{localStorage.setItem('nip_'+key,JSON.stringify(val))}catch(e){} }
function loadData(key,def){ try{const v=localStorage.getItem('nip_'+key);return v?JSON.parse(v):def}catch(e){return def} }
function getSetKey(w,d,exIdx,setIdx,field){ return `w${w}d${d}e${exIdx}s${setIdx}${field}`; }
function getDayDoneKey(w,d){ return `done_w${w}d${d}`; }

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderWeekSelector(){
  const c=document.getElementById('weekSelector');
  c.innerHTML='';
  for(let w=1;w<=10;w++){
    const btn=document.createElement('button');
    btn.className='sel-btn'+(w===currentWeek?' active':'');
    // Check if all days done
    let allDone=true;
    for(let d=1;d<=5;d++) if(!loadData(getDayDoneKey(w,d),false)){allDone=false;break;}
    if(allDone) btn.classList.add('done');
    btn.textContent=WEEK_LABELS[w];
    btn.onclick=()=>{currentWeek=w;currentDay=1;renderAll();};
    c.appendChild(btn);
  }
}

  c.innerHTML='';
  for(let d=1;d<=5;d++){
    const btn=document.createElement('button');
    btn.className='sel-btn'+(d===currentDay?' active':'');
    if(loadData(getDayDoneKey(currentWeek,d),false)) btn.classList.add('done');
    btn.textContent=DAY_LABELS[d];
    btn.onclick=()=>{currentDay=d;renderExercises();updateProgress();renderDaySelector();updateDayCompleteBtn();};
    c.appendChild(btn);
  }
}

function renderExercises(){
  const c=document.getElementById('exerciseList');
  c.innerHTML='';
  const day=PROGRAM[currentWeek][currentDay];
  if(!day)return;
  document.getElementById('weekLabel').textContent=day.title;

  day.exercises.forEach((ex,exIdx)=>{
    const card=document.createElement('div');
    card.className='ex-card';
    card.id='ex-'+exIdx;

    // Check if all sets done
    let allSetsDone=true;
    for(let s=0;s<ex.sets;s++){
      if(!loadData(getSetKey(currentWeek,currentDay,exIdx,s,'done'),false)){allSetsDone=false;break;}
    }
    if(allSetsDone) card.classList.add('completed');

    // Header
    const header=document.createElement('div');
    header.className='ex-header';
    header.onclick=()=>{ card.classList.toggle('open'); };

    header.innerHTML=`
      <div class="ex-num">${exIdx+1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">
          <span class="ex-tag tag-sets">${ex.sets} séries</span>
          <span class="ex-tag tag-reps">×${ex.reps}</span>
          <span class="ex-tag tag-rpe">${ex.rpe}</span>
          <span class="ex-tag tag-rest">⏱ ${ex.rest}</span>
        </div>
      </div>
    `;
    card.appendChild(header);

    // Note
    const note=document.createElement('div');
    note.className='ex-note';
    note.textContent=ex.note;
    card.appendChild(note);

    // Sets
    const setsArea=document.createElement('div');
    setsArea.className='sets-area';

    const setsHeader=document.createElement('div');
    setsHeader.className='sets-header';
    setsHeader.innerHTML='<span>Set</span><span>Charge (kg)</span><span>Reps</span><span>✓</span>';
    setsArea.appendChild(setsHeader);

    for(let s=0;s<ex.sets;s++){
      const row=document.createElement('div');
      row.className='set-row';

      const label=document.createElement('div');
      label.className='set-label';
      label.textContent=`${s+1}`;

      const weightInput=document.createElement('input');
      weightInput.type='number';
      weightInput.inputMode='decimal';
      weightInput.className='set-input';
      weightInput.placeholder='kg';
      weightInput.value=loadData(getSetKey(currentWeek,currentDay,exIdx,s,'w'),'');
      weightInput.onchange=function(){ saveData(getSetKey(currentWeek,currentDay,exIdx,s,'w'),this.value); };

      const repsInput=document.createElement('input');
      repsInput.type='text';
      repsInput.inputMode='numeric';
      repsInput.className='set-input';
      repsInput.placeholder=ex.reps;
      repsInput.value=loadData(getSetKey(currentWeek,currentDay,exIdx,s,'r'),'');
      repsInput.onchange=function(){ saveData(getSetKey(currentWeek,currentDay,exIdx,s,'r'),this.value); };

      const check=document.createElement('button');
      check.className='set-check';
      if(loadData(getSetKey(currentWeek,currentDay,exIdx,s,'done'),false)) check.classList.add('done');
      check.textContent='✓';
      check.onclick=function(){
        const isDone=this.classList.toggle('done');
        saveData(getSetKey(currentWeek,currentDay,exIdx,s,'done'),isDone);
        checkExComplete(card,ex,exIdx);
        updateProgress();
        if(isDone) autoStartTimer(ex.rest);
      };

      row.appendChild(label);
      row.appendChild(weightInput);
      row.appendChild(repsInput);
      row.appendChild(check);
      setsArea.appendChild(row);
    }
    card.appendChild(setsArea);
    c.appendChild(card);
  });
}

function checkExComplete(card,ex,exIdx){
  let allDone=true;
  for(let s=0;s<ex.sets;s++){
    if(!loadData(getSetKey(currentWeek,currentDay,exIdx,s,'done'),false)){allDone=false;break;}
  }
  if(allDone) card.classList.add('completed');
  else card.classList.remove('completed');
}

function updateProgress(){
  const day=PROGRAM[currentWeek][currentDay];
  if(!day)return;
  let total=0,done=0;
  day.exercises.forEach((ex,exIdx)=>{
    total+=ex.sets;
    for(let s=0;s<ex.sets;s++){
      if(loadData(getSetKey(currentWeek,currentDay,exIdx,s,'done'),false)) done++;
    }
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} / ${total} séries`;
}

function updateDayCompleteBtn(){
  const btn=document.getElementById('dayCompleteBtn');
  const isDone=loadData(getDayDoneKey(currentWeek,currentDay),false);
  btn.classList.toggle('is-done',isDone);
  btn.textContent=isDone?'Jour terminé ✓':'Marquer jour terminé ✓';
}

function toggleDayComplete(){
  const key=getDayDoneKey(currentWeek,currentDay);
  const newVal=!loadData(key,false);
  saveData(key,newVal);
  updateDayCompleteBtn();
  renderWeekSelector();
  renderDaySelector();
}

function renderAll(){
  renderWeekSelector();
  renderDaySelector();
  renderExercises();
  updateProgress();
  updateDayCompleteBtn();
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function toggleTimer(){
  timerVisible=!timerVisible;
  document.getElementById('timerBar').classList.toggle('visible',timerVisible);
  document.getElementById('timerFab').style.display=timerVisible?'none':'flex';
}

function formatTime(s){
  const m=Math.floor(s/60);
  const sec=s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

function updateTimerDisplay(){
  const d=document.getElementById('timerDisplay');
  d.textContent=formatTime(timerRemaining);
  d.classList.toggle('done-color',timerRemaining===0&&!timerRunning);
}

function setTimer(seconds){
  timerSeconds=seconds;
  timerRemaining=seconds;
  clearInterval(timerInterval);
  timerRunning=false;
  document.getElementById('timerStartBtn').textContent='Start';
  document.getElementById('timerStartBtn').className='timer-btn btn-start';
  updateTimerDisplay();
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('active',parseInt(b.textContent.split(':')[0])*60+parseInt(b.textContent.split(':')[1])===seconds);
  });
}

function startTimer(){
  if(timerRunning){
    clearInterval(timerInterval);
    timerRunning=false;
    document.getElementById('timerStartBtn').textContent='Start';
    document.getElementById('timerStartBtn').className='timer-btn btn-start';
    return;
  }
  if(timerRemaining<=0) timerRemaining=timerSeconds;
  timerRunning=true;
  document.getElementById('timerStartBtn').textContent='Pause';
  document.getElementById('timerStartBtn').className='timer-btn btn-stop';
  timerInterval=setInterval(()=>{
    timerRemaining--;
    updateTimerDisplay();
    if(timerRemaining<=0){
      clearInterval(timerInterval);
      timerRunning=false;
      document.getElementById('timerStartBtn').textContent='Start';
      document.getElementById('timerStartBtn').className='timer-btn btn-start';
      // Vibrate
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
      // Audio beep
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        [0,.25,.5].forEach(t=>{
          const o=ctx.createOscillator();
          const g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value=880;
          g.gain.value=0.3;
          o.start(ctx.currentTime+t);
          o.stop(ctx.currentTime+t+0.15);
        });
      }catch(e){}
      updateTimerDisplay();
    }
  },1000);
}

function resetTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  timerRemaining=timerSeconds;
  document.getElementById('timerStartBtn').textContent='Start';
  document.getElementById('timerStartBtn').className='timer-btn btn-start';
  updateTimerDisplay();
}

function autoStartTimer(restStr){
  // Parse rest time and auto-start
  const match=restStr.match(/(\d+)/);
  if(match){
    const mins=parseInt(match[1]);
    setTimer(mins*60);
    timerRemaining=mins*60;
    if(!timerVisible) toggleTimer();
    // Auto start after a tiny delay
    setTimeout(()=>{
      if(!timerRunning) startTimer();
    },300);
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderAll();
updateTimerDisplay();
</script>
